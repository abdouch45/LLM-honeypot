services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - LOG_DIRECTORY=/home/cowrie/cowrie/var/log/cowrie
      - STATS_FILE=/data/stats/honeypot_stats.json
    volumes:
      - /home/cowrie/cowrie/var/log/cowrie:/home/cowrie/cowrie/var/log/cowrie:ro
      - /var/lib/docker/vol/_data:/data/stats
      - /var/www/honeypot:/www
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    develop:
      watch:
        - action: rebuild
          path: ./web

volumes:
  stats_data:
    driver: local
  cowrie_logs:
    driver: local
  web_data:
    driver: local
